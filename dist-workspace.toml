[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "npm", "homebrew"]
# The npm package name: `bushido` and `bdo` are both squatted on npm,
# so the package is `bdo-cli`. The installed command is still `bdo`
# (npm's bin name comes from the cargo [[bin]] name).
npm-package = "bdo-cli"
# Some security scanners flag any npm package that ships an
# npm-shrinkwrap.json as a supply-chain risk heuristic (it can pin
# dependency versions the top-level package.json doesn't show). Our
# lockfile matched package.json exactly and posed no real risk, but the
# installer only needs `detect-libc`/`prettier`'s existing semver ranges —
# skip generating the lockfile rather than keep re-justifying the warning.
npm-shrinkwrap = false
# Publish the Homebrew formula and the npm package from CI.
# Requires repo secrets: HOMEBREW_TAP_TOKEN (PAT with write access to the
# tap repo) and NPM_TOKEN (npm automation token).
publish-jobs = ["homebrew", "npm"]
# The GitHub repo to push the Homebrew formula to
tap = "tedorigawa001/homebrew-tap"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
