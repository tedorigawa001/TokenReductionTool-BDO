<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="100%" stop-color="#3fb950" />
    </linearGradient>
  </defs>
  
  <!-- 背景 (GitHubのダークテーマに合わせた色) -->
  <rect width="100%" height="100%" fill="url(#bg)" rx="15" />

  <!-- 刀のミニマルアイコン -->
  <g transform="translate(70, 100) rotate(-45)">
    <rect x="-40" y="-4" width="80" height="8" fill="#8b949e" rx="4"/>
    <rect x="-60" y="-8" width="20" height="16" fill="#f85149" rx="2"/>
    <circle cx="-50" cy="0" r="12" fill="#c9d1d9" />
  </g>

  <!-- テキスト -->
  <text x="150" y="115" font-family="Arial, sans-serif" font-size="72" font-weight="900" fill="url(#textGrad)" letter-spacing="4">BDO</text>
  <text x="155" y="150" font-family="Courier New, monospace" font-size="20" fill="#8b949e">Bushido - Token Killer</text>
</svg>